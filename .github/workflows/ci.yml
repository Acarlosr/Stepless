name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Solidity compile + test (Foundry)
  # ─────────────────────────────────────────────
  solidity:
    name: Solidity Compile & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Cache Foundry
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            out
            cache
          key: foundry-${{ runner.os }}-${{ hashFiles('**/*.sol', 'foundry.toml') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Compile contracts
        working-directory: contracts
        run: forge build

      - name: Run tests
        working-directory: contracts
        run: forge test -vvv

      - name: Verify deployment bytecode is current
        run: node scripts/sync-distributor-bytecode.mjs --check

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # Job 2: Frontend validation (vanilla HTML/JS)
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML files exist
        run: |
          echo "Checking frontend files..."
          test -f frontend/dashboard.html && echo "✅ dashboard.html" || (echo "❌ dashboard.html missing" && exit 1)
          test -f frontend/index.html    && echo "✅ index.html"     || (echo "❌ index.html missing"     && exit 1)
          test -f frontend/dashboard.js  && echo "✅ dashboard.js"   || (echo "❌ dashboard.js missing"   && exit 1)
          test -f frontend/arc-config.js && echo "✅ arc-config.js"  || (echo "❌ arc-config.js missing"  && exit 1)
          test -f api/relay.js           && echo "✅ api/relay.js"   || (echo "❌ api/relay.js missing"   && exit 1)
          echo "✅ All frontend files present"

      - name: Validate JS syntax
        run: |
          node --input-type=module < frontend/arc-config.js && echo "✅ arc-config.js syntax OK" || echo "⚠️ arc-config.js syntax warning"

  # ─────────────────────────────────────────────
  # Job 3: Subgraph manifest validation
  # ─────────────────────────────────────────────
  subgraph:
    name: Subgraph Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate subgraph files
        run: |
          test -f subgraph/subgraph.yaml && echo "✅ subgraph.yaml" || (echo "❌ subgraph.yaml missing" && exit 1)
          test -f subgraph/schema.graphql && echo "✅ schema.graphql" || (echo "❌ schema.graphql missing" && exit 1)
          echo "✅ Subgraph manifest validated"
